<div class="app-shell">
  <aside class="sidebar" [class.colapsada]="sidebarCollapsed()">
    <div class="sidebar-brand">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </div>
      <div *ngIf="!sidebarCollapsed()">
        <div class="titulo">Obra da Casa</div>
        <div class="subtitulo">Gestão de obras</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="ativo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect>
        </svg>
        <span *ngIf="!sidebarCollapsed()">Dashboard</span>
      </a>

      <a routerLink="/gastos" routerLinkActive="ativo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"></path>
        </svg>
        <span *ngIf="!sidebarCollapsed()">Gastos</span>
      </a>

      <a routerLink="/calendario" routerLinkActive="ativo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span *ngIf="!sidebarCollapsed()">Calendário</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button type="button" (click)="toggleSidebar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
        <span *ngIf="!sidebarCollapsed()">Recolher</span>
      </button>
    </div>
  </aside>

  <main>
    <router-outlet></router-outlet>
  </main>
</div>

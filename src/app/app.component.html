<div class="app-shell">
  <aside class="sidebar" [class.colapsada]="sidebarCollapsed()">
    <div class="sidebar-brand">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </div>
      <div *ngIf="!sidebarCollapsed()">
        <div class="titulo">Obra da Casa</div>
        <div class="subtitulo">Gestão de obras</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/pendencias" routerLinkActive="ativo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span *ngIf="!sidebarCollapsed()">Pendências</span>
      </a>

      <a routerLink="/dashboard" routerLinkActive="ativo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect>
        </svg>
        <span *ngIf="!sidebarCollapsed()">Dashboard</span>
      </a>

      <a routerLink="/gastos" routerLinkActive="ativo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"></path>
        </svg>
        <span *ngIf="!sidebarCollapsed()">Gastos</span>
      </a>

      <a routerLink="/orcamentos" routerLinkActive="ativo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="3" width="16" height="18" rx="2"></rect><line x1="8" y1="8" x2="16" y2="8"></line><line x1="8" y1="12" x2="16" y2="12"></line><line x1="8" y1="16" x2="12" y2="16"></line>
        </svg>
        <span *ngIf="!sidebarCollapsed()">Orçamentos</span>
      </a>

      <a routerLink="/lista-compras" routerLinkActive="ativo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span *ngIf="!sidebarCollapsed()">Lista de compras</span>
      </a>

      <a routerLink="/financeiro" routerLinkActive="ativo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"></circle><path d="M12 7v10"></path><path d="M15 9.5c0-1.4-1.34-2.5-3-2.5s-3 1.1-3 2.5 1.34 2.5 3 2.5 3 1.1 3 2.5-1.34 2.5-3 2.5-3-1.1-3-2.5"></path>
        </svg>
        <span *ngIf="!sidebarCollapsed()">Financeiro</span>
      </a>

      <a routerLink="/calendario" routerLinkActive="ativo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span *ngIf="!sidebarCollapsed()">Calendário</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button type="button" (click)="toggleSidebar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
        <span *ngIf="!sidebarCollapsed()">Recolher</span>
      </button>
    </div>
  </aside>

  <main>
    <router-outlet></router-outlet>
  </main>
</div>

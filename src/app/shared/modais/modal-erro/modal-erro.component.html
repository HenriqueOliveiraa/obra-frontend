<div class="merro-overlay" *ngIf="visivel" (click)="onOverlayClick()">
  <div class="merro-modal" (click)="$event.stopPropagation()" role="dialog" aria-modal="true">
    <div class="merro-icone">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="14.5" y1="9.5" x2="9.5" y2="14.5"></line>
        <line x1="9.5" y1="9.5" x2="14.5" y2="14.5"></line>
      </svg>
    </div>

    <h2 class="merro-titulo">{{ titulo }}</h2>
    <p class="merro-mensagem">{{ mensagem }}</p>

    <button type="button" class="merro-btn" (click)="onFechar()">
      {{ textoBotao }}
    </button>
  </div>
</div>

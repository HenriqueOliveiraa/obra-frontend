<div class="msuc-overlay" *ngIf="visivel" (click)="onOverlayClick()">
  <div class="msuc-modal" (click)="$event.stopPropagation()" role="dialog" aria-modal="true">
    <div class="msuc-icone">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M8 12.5l2.6 2.6L16 9.5"></path>
      </svg>
    </div>

    <h2 class="msuc-titulo">{{ titulo }}</h2>
    <p class="msuc-mensagem">{{ mensagem }}</p>

    <button type="button" class="msuc-btn" (click)="onFechar()">
      {{ textoBotao }}
    </button>
  </div>
</div>

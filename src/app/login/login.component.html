<div class="login-page">
  <div class="login-visual" aria-hidden="true"></div>

  <div class="login-form-area">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">
          <img src="/logo1.png" alt="Obra da Casa" class="login-logo-img">
        </div>
        <div class="login-titulo">Obra da Casa</div>
      </div>

      <form class="login-formulario" (ngSubmit)="onSubmit()">
        <div class="campo-login">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            placeholder="Digite o e-mail"
            autocomplete="email"
            required>
        </div>

        <div class="campo-login">
          <label for="senha">Senha</label>
          <div class="senha-wrapper">
            <input
              [type]="mostrarSenha ? 'text' : 'password'"
              id="senha"
              name="senha"
              [(ngModel)]="senha"
              placeholder="Digite a senha"
              autocomplete="current-password"
              required>
            <button
              type="button"
              class="botao-olho"
              (click)="mostrarSenha = !mostrarSenha"
              [attr.aria-label]="mostrarSenha ? 'Ocultar senha' : 'Mostrar senha'">
              <svg *ngIf="!mostrarSenha" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg *ngIf="mostrarSenha" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a18.44 18.44 0 015.06-5.94M9.9 4.24A10.94 10.94 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M14.12 14.12a3 3 0 11-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <p class="login-erro" *ngIf="erro">{{ erro }}</p>

        <button type="submit" class="botao-acessar" [disabled]="carregando">
          {{ carregando ? 'Entrando...' : 'Acessar' }}
        </button>
      </form>
    </div>
  </div>
</div>
